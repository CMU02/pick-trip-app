version: 2
updates:
  # npm 생태계 (Bun lockfile 지원)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    # 한국어 git convention(chore) 적용
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    # minor/patch 업데이트를 묶어 PR 노이즈 감소
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Expo / React Native는 호환성이 민감하므로 major 업데이트는 자동 PR 제외
    ignore:
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
